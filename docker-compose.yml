version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sadhya_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./avatar:/app/avatar
      - ./Wav2Lip:/app/Wav2Lip
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sadhya_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - NEXT_PUBLIC_BACKEND_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
